services:
  lamutuelleseniors:
    build:
      context: .
      args:
        GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
        BING_SITE_VERIFICATION: "${BING_SITE_VERIFICATION:-}"
        SITE_LEGAL_ENTITY: "${SITE_LEGAL_ENTITY:-}"
        SITE_LEGAL_ADDRESS: "${SITE_LEGAL_ADDRESS:-}"
        SITE_EMAIL: "${SITE_EMAIL:-}"
        SITE_DPO_NAME: "${SITE_DPO_NAME:-}"
        SITE_DPO_EMAIL: "${SITE_DPO_EMAIL:-}"
    container_name: lamutuelleseniors
    user: "1001:1001"
    ports:
      - "${EXTERNAL_PORT:-3007}:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      DATABASE_PATH: "/data/lamutuelleseniors.db"
      LEAD_DELIVERY_MODE: "${LEAD_DELIVERY_MODE:-mock}"
      LEAD_DELIVERY_API_BASE_URL: "${LEAD_DELIVERY_API_BASE_URL:-https://leads.vos2vis.net/api}"
      LEAD_DELIVERY_API_KEY: "${LEAD_DELIVERY_API_KEY:-}"
      LEAD_DELIVERY_API_SECRET: "${LEAD_DELIVERY_API_SECRET:-}"
      LEAD_DELIVERY_EXTERNAL_SOURCE: "${LEAD_DELIVERY_EXTERNAL_SOURCE:-lamutuelleseniors-tunnel-v1}"
      LEAD_DELIVERY_FORM_ID: "${LEAD_DELIVERY_FORM_ID:-lamutuelleseniors-form-mutuelle-v1}"
      LEAD_DELIVERY_ROUTING_RULE_ID_SENIOR: "${LEAD_DELIVERY_ROUTING_RULE_ID_SENIOR:-}"
      LEAD_DELIVERY_ROUTING_RULE_ID_UNDER55_FAMILY: "${LEAD_DELIVERY_ROUTING_RULE_ID_UNDER55_FAMILY:-}"
      LEAD_DELIVERY_ROUTING_RULE_ID_UNDER55_SOLO: "${LEAD_DELIVERY_ROUTING_RULE_ID_UNDER55_SOLO:-}"
      LEAD_DELIVERY_SNAPSHOT_BASE_URL: "${LEAD_DELIVERY_SNAPSHOT_BASE_URL:-}"
      LEAD_DELIVERY_FULL_CONSENT_PROOF: "${LEAD_DELIVERY_FULL_CONSENT_PROOF:-false}"
      CONSENT_AUDIT_LOG_PATH: "${CONSENT_AUDIT_LOG_PATH:-/data/consent-audit.log}"
      MAIL_NOTIFY: "${MAIL_NOTIFY:-true}"
      GMAIL_USER: "${GMAIL_USER:-}"
      GMAIL_PASS: "${GMAIL_PASS:-}"
      MAIL_TO: "${MAIL_TO:-}"
      MAIL_FROM: "${MAIL_FROM:-}"
      PLAUSIBLE_DOMAIN: "${PLAUSIBLE_DOMAIN:-www.la-mutuelle-seniors.fr}"
      PLAUSIBLE_HOST: "${PLAUSIBLE_HOST:-https://plausible.io}"
      RATE_LIMIT_SUBMISSIONS_PER_HOUR: "${RATE_LIMIT_SUBMISSIONS_PER_HOUR:-10}"
      RETRY_CRON_TOKEN: "${RETRY_CRON_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
      BING_SITE_VERIFICATION: "${BING_SITE_VERIFICATION:-}"
      SITE_NAME: "${SITE_NAME:-La Mutuelle Seniors}"
      SITE_LEGAL_ENTITY: "${SITE_LEGAL_ENTITY:-}"
      SITE_LEGAL_ADDRESS: "${SITE_LEGAL_ADDRESS:-}"
      SITE_EMAIL: "${SITE_EMAIL:-}"
      SITE_DPO_NAME: "${SITE_DPO_NAME:-}"
      SITE_DPO_EMAIL: "${SITE_DPO_EMAIL:-}"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - proxy-net

networks:
  proxy-net:
    external: true
